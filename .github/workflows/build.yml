name: Build & Lint

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

# Cancel superseded runs on the same ref so iterative pushes (especially
# from AI-assisted branches that push 3-5 times before CI green) don't
# stack up. Tag pushes are excluded — they upload release assets, so
# every tag run must complete.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      # softprops/action-gh-release needs contents:write to create or
      # update the GitHub Release on tag push. The repo default is
      # contents:read since GitHub tightened workflow permissions.
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Security audit
        # Fails the build on high or critical advisories. Low/moderate
        # are reported as Dependabot PRs (.github/dependabot.yml).
        # Added v1.4.2 — see issue #19.
        run: npm audit --audit-level=high

      - name: Lint
        # ESLint 10 with typescript-eslint, lit, sonarjs plugins.
        # Re-activated v1.4.2 after the v1.2 stub. Errors fail CI;
        # complexity warnings are tracked as backlog (eslint.config.mjs).
        run: npm run lint

      - name: Architecture rules
        # dependency-cruiser enforces module-boundary rules:
        # no-circular, chart/editor/utils may not uplevel-import.
        # Added v1.4.2 — see .dependency-cruiser.cjs and issue #19.
        run: npm run depcheck

      - name: Install Playwright browsers
        # Cached by GHA between runs as long as the version pinned in
        # package-lock.json is unchanged. ~150 MB Chromium download
        # the first time, ~1 s on cache hit.
        run: npx playwright install chromium --with-deps

      - name: Typecheck
        # `tsc --noEmit` against tsconfig.json with strict + noImplicitAny.
        # `main.ts` carries `@ts-nocheck` (integration boundary —
        # see header) but its imports are still resolved and contracts
        # checked.
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Coverage gate
        # Fails the build if any of statements / branches / functions /
        # lines drops below the threshold configured in vitest.config.js.
        # Scope is the modules listed there — main.ts / editor / chart
        # orchestration are deferred to v1.3 (Playwright E2E).
        # Note: pre-v1.4.2 the include array listed .js paths after the
        # v1.2 .ts migration, so the gate matched zero files and was
        # silently inert. Fixed in #19.
        run: npm run coverage

      - name: Build
        run: npm run rollup

      - name: Bundle budget
        # Hard cap at 800 KB raw / 250 KB gzipped across all dist/*.js
        # (current ~220 KB raw / ~65 KB gzip after editor split).
        # Tripping either signals a regression in tree-shaking or an
        # accidental large dep — investigate before merging.
        # The sum-across-files shape (vs. per-file) covers the
        # post-ESM-split layout: a thin entry + lazy chunks. Bytes-on-
        # the-wire is what HA's frontend cache pays for; the user only
        # actually fetches main + whichever lazy chunks their session
        # exercises, so the sum is the worst-case total.
        run: |
          raw=0
          gzip=0
          for f in dist/*.js; do
            r=$(wc -c < "$f")
            g=$(gzip -c "$f" | wc -c)
            echo "$f: $r raw / $g gzipped"
            raw=$((raw + r))
            gzip=$((gzip + g))
          done
          raw_limit=$((800 * 1024))
          gzip_limit=$((250 * 1024))
          echo "total: $raw bytes raw (limit: $raw_limit)"
          echo "       $gzip bytes gzipped (limit: $gzip_limit)"
          fail=0
          if [ "$raw" -gt "$raw_limit" ]; then
            echo "::error::Bundle total exceeds 800 KB raw budget."
            fail=1
          fi
          if [ "$gzip" -gt "$gzip_limit" ]; then
            echo "::error::Bundle total exceeds 250 KB gzipped budget."
            fail=1
          fi
          [ "$fail" = "0" ]

      - name: E2E + visual regression
        # Playwright spec suite under tests-e2e/. Boots the bundle
        # into a static-served harness, drives the card through a
        # fake-hass mock, and compares 7 baseline screenshots. The
        # webServer is configured in playwright.config.ts.
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14

      - name: Render-time advisory summary
        # Pulls test-results/perf-render-time.json (written by the
        # tests-e2e/perf-render-time.spec.ts E2E spec) and renders it
        # in the build summary. Advisory only — never fails the build,
        # GHA-runner CPU variability would create false positives.
        # Sustained regressions become visible as a trend in the
        # summary line over multiple PRs.
        if: ${{ always() }}
        run: |
          if [ ! -f test-results/perf-render-time.json ]; then
            echo "perf-render-time.json missing (E2E may have failed before the spec ran)" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          {
            echo "## Render-time advisory"
            echo ""
            echo "End-to-end mount → chart-rendered timing for three representative configs (5 iterations each)."
            echo ""
            echo "| Scenario | Median (ms) | p95 (ms) |"
            echo "|---|---:|---:|"
            node -e "
              const r = require('./test-results/perf-render-time.json');
              for (const s of r.samples) {
                console.log(\`| \${s.scenario} | \${s.median_ms} | \${s.p95_ms} |\`);
              }
            "
            echo ""
            echo "_Advisory only — not a CI gate. GHA-runner variability is high; track trends across PRs, not single-PR diffs._"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Verify committed bundle matches source
        # After ADR-0013 (ESM code-split) `dist/` holds a hashed-chunk
        # set alongside the entry — verify the whole directory, not
        # just the entry file. Chunk filenames are content-hashed so
        # any source change that touches the bundle output produces a
        # diff here; a clean directory means committed = built.
        run: |
          if ! git diff --quiet -- dist/; then
            echo "::error::dist/ is out of sync with source. Run 'npm run build' and commit the result."
            git --no-pager diff --stat -- dist/
            git --no-pager status --short -- dist/
            exit 1
          fi

      - name: Verify package.json version matches tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg=$(node -p "require('./package.json').version")
          if [ "$tag" != "$pkg" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match package.json version $pkg."
            exit 1
          fi

      - name: Extract release notes from CHANGELOG.md
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v header="## [${GITHUB_REF_NAME#v}]" '
            /^## \[/ {
              if (found) exit
              if (index($0, header) == 1) { found=1; next }
              next
            }
            found { print }
          ' CHANGELOG.md > .release-notes.md
          if [ ! -s .release-notes.md ]; then
            echo "::error::CHANGELOG.md has no '## [$version]' section. Add one before tagging."
            exit 1
          fi
          echo "--- extracted release notes ---"
          cat .release-notes.md

      - name: Upload bundle to release
        # ADR-0013: the dist now contains the registered entry plus
        # content-hashed lazy chunks. HACS downloads every release
        # asset for plugin repos (verified against HACS source —
        # gather_files_to_download), so attach all dist/*.js files.
        # Without this, lazy chunks would 404 in HACS-installed
        # cards even though the entry file loads.
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*.js
          body_path: .release-notes.md
